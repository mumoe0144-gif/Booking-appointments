<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruv Plumbing - Book Appointment</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5;margin:0}
.container{max-width:400px;margin:auto}
.widget{background:white;padding:20px;border-radius:0 0 12px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
input,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{background:#1a73e8;color:white;border:none;cursor:pointer}
button:disabled{background:#ccc}
#slots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px}
.slot{padding:10px;border:2px solid #1a73e8;border-radius:6px;text-align:center;cursor:pointer}
.slot.booked{background:#eee;color:#999;border-color:#ccc;cursor:not-allowed}
h3{color:#1a73e8;margin-top:0}
</style>
</head>
<body>
<div class="container">

<!-- 1. LOGO HEADER - BLUE BAR WITH LOGO -->
<div style="text-align:center; padding:25px 20px; background:#1a73e8; border-radius:12px 12px 0 0;">
  <img src="An9GSyKLCFkFWnsQkhctfP-_gQzdGVx54_rntljYgVR8T3AKJ_j0oVqtWauvTK6BWGbdwzTlkE5WbupqHKaWkj47dnw9HpvtEQqoJ9dtGWlVEkcYFqWx751x"
       alt="Logo"
       style="width:80px; height:80px; border-radius:50%; background:white; padding:8px; margin-bottom:10px;">
  <h2 style="color:white; margin:0; font-size:22px;">Bruv Plumbing Services</h2>
  <p style="color:white; opacity:0.9; margin:5px 0 0; font-size:14px;">Fast repairs in Kiserian • Same-day service</p>
</div>

<!-- 2. PLUMBER IMAGE -->
<img src="An9GSyKLCFkFWnsQkhctfP-_gQzdGVx54_rntljYgVR8T3AKJ_j0oVqtWauvTK6BWGbdwzTlkE5WbupqHKaWkj47dnw9HpvtEQqoJ9dtGWlVEkcYFqWx751x"
     alt="Plumbing Service"
     style="width:100%; display:block;">

<!-- 3. YOUR BOOKING WIDGET BELOW -->
<div class="widget">
<h3>Book with Bruv</h3>
<input type="date" id="date" min="">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<div id="slots">Pick a date first</div>
</div>

<script>
const API_KEY = 'AIzaSyCRoYevByfjjw7I4Eoge8gZwM5i8ryjKJI';
const CALENDAR_ID = 'primary';
const CALENDLY_LINK = 'https://calendly.com/bruv93586/30min';
const START_HOUR = 9;
const END_HOUR = 17;
const SLOT_MINUTES = 30;

document.getElementById('date').min = new Date().toISOString().split('T')[0];
document.getElementById('date').addEventListener('change', loadSlots);

async function loadSlots(){
  const date = document.getElementById('date').value;
  if(!date) return;
  document.getElementById('slots').innerHTML = 'Loading slots...';

  const timeMin = date + 'T00:00:00Z';
  const timeMax = date + 'T23:59:59Z';
  const url = `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&key=${API_KEY}`;

  try{
    const res = await fetch(url);
    const data = await res.json();
    const booked = [];
    (data.items||[]).forEach(e=>{
      if(e.start.dateTime){
        const d = new Date(e.start.dateTime);
        booked.push(d.getHours()*60 + d.getMinutes());
      }
    });

    let html = '';
    for(let h=START_HOUR; h<END_HOUR; h++){
      for(let m=0; m<60; m+=SLOT_MINUTES){
        const time = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        const mins = h*60 + m;
        const isBooked = booked.some(b => Math.abs(b-mins) < SLOT_MINUTES);
        html += `<div class="slot ${isBooked?'booked':''}" onclick="${isBooked?'':`book('${date}','${time}')`}">${time}</div>`;
      }
    }
    document.getElementById('slots').innerHTML = html;
  }catch(e){
    document.getElementById('slots').innerHTML = 'Error loading';
  }
}

function book(date,time){
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  if(!name||!email){ alert('Enter name + email first'); return; }

  const url = `${CALENDLY_LINK}?date=${date}&time=${time}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
  window.open(url, '_blank');
}
</script>
</div>
</body>
</html>
